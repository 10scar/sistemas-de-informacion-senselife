<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Integración Senselife - API Documentation</title>
    <style>
        body { margin: 0; padding: 0; }
        #opencollection-container { width: 100vw; height: 100vh; }
    </style>
    <link rel="stylesheet" href="https://cdn.opencollection.com/docs.css">
    <script src="https://cdn.opencollection.com/docs.js"></script>
</head>
<body>
    <div id="opencollection-container"></div>
    <script>
        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: Integraci\xF3n Senselife\nconfig:\n  environments:\n    - name: Local\n      variables:\n        - name: data_ms_url\n          value: http://localhost:3001\n        - name: sistem_url\n          value: http://localhost:8080\n        - name: broker_http_url\n          value: http://localhost:1883\n        - name: internal_auth_token\n          value: tu_token_secreto_aqui\n        - name: device_api_key\n          value: tu_clave_secreta_del_dispositivo\nitems:\n  - info:\n      name: Obtener Historial de Telemetr\xEDa\n      type: http\n      seq: 1\n    http:\n      method: GET\n      url: '{{data_ms_url}}/api/v1/telemetria/:id_dispositivo?fecha_inicio=2024-05-01T00:00:00Z&fecha_fin=2024-05-08T23:59:59Z'\n      headers:\n        - name: x-internal-token\n          value: '{{internal_auth_token}}'\n        - name: Accept\n          value: application/json\n      params:\n        - name: fecha_inicio\n          value: '2024-05-01T00:00:00Z'\n          type: query\n        - name: fecha_fin\n          value: '2024-05-08T23:59:59Z'\n          type: query\n        - name: id_dispositivo\n          value: '105'\n          type: path\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      Retorna un arreglo JSON con la estructura:\n      [\n        {\n          \"id\": 98450,\n          \"id_dispositivo\": 105,\n          \"frecuencia_cardiaca\": 140.5,\n          \"frecuencia_respiratoria\": 45.2,\n          \"tiempo\": \"2024-05-08T10:15:30Z\"\n        }\n      ]\n  - info:\n      name: Obtener \xDAltima Telemetr\xEDa\n      type: http\n      seq: 2\n    http:\n      method: GET\n      url: '{{data_ms_url}}/api/v1/telemetria/:id_dispositivo/actual'\n      headers:\n        - name: x-internal-token\n          value: '{{internal_auth_token}}'\n        - name: Accept\n          value: application/json\n      params:\n        - name: id_dispositivo\n          value: '105'\n          type: path\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: Retorna un \xFAnico objeto JSON con la lectura m\xE1s reciente en la base de datos de series de tiempo.\n  - info:\n      name: Registrar Alerta en Monolito\n      type: http\n      seq: 3\n    http:\n      method: POST\n      url: '{{sistem_url}}/api/v1/alertas'\n      headers:\n        - name: Content-Type\n          value: application/json\n        - name: x-internal-token\n          value: '{{internal_auth_token}}'\n      body:\n        type: json\n        data: |-\n          {\n            \"id_paciente\": 402,\n            \"id_telemetria\": 98453,\n            \"estado\": \"pendiente\"\n          }\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      El monolito (senselife-system) recibe esta petici\xF3n.\n      1. Valida el token interno.\n      2. Inserta el registro en la tabla `alerta`.\n      3. (Opcional) El monolito dispara un evento interno de Auditor\xEDa o notifica a los WebSockets conectados \n\n      Respuesta esperada: 201 Created\n  - info:\n      name: Ingesta de Sensor IoT\n      type: http\n      seq: 4\n    http:\n      method: POST\n      url: '{{broker_http_url}}/api/v1/telemetry/ingest'\n      headers:\n        - name: Content-Type\n          value: application/json\n        - name: x-device-key\n          value: '{{device_api_key}}'\n      body:\n        type: json\n        data: |-\n          {\n            \"public_id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n            \"frecuencia_cardiaca\": 155.0,\n            \"frecuencia_respiratoria\": 50.5,\n            \"timestamp\": \"2024-05-08T10:15:30Z\"\n          }\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      Nota: \n      El hardware real puede publicar este mismo JSON por el protocolo MQTT bajo `senselife/devices/{public_id}/telemetry`.\n\n\n      Flujo interno esperado tras esta petici\xF3n:\n      1. El Broker recibe el mensaje.\n      2. `senselife-data` lo consume de la cola.\n      3. `senselife-data` lo guarda en `senselife-data-db`.\n      4. Si los valores superan umbrales, se dispara la petici\xF3n #3 (Registrar Alerta).\ndocs:\n  content: Documentaci\xF3n de comunicaci\xF3n entre senselife-system y senselife-data\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-05-09T05:00:30.698Z'\n    exportedUsing: Bruno/3.3.0\n";
        new window.OpenCollection({
            target: document.getElementById('opencollection-container'),
            opencollection: collectionData,
            theme: 'light'
        });
    </script>
</body>
</html>
