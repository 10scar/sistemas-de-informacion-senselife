services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: senselife_data
      PYTHONPATH: /app
    depends_on:
      mongo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./data:/app/data

volumes:
  mongo_data:
